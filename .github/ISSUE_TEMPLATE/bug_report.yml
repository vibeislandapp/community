name: "Bug Report"
description: "Something isn't working as expected / 报告 Bug"
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much detail as you can.
        感谢反馈！请尽量填写详细信息。

  - type: input
    id: version
    attributes:
      label: "Vibe Island Version"
      description: "Settings → About → Version"
      placeholder: "e.g. 1.0.16"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: "macOS Version"
      placeholder: "e.g. macOS 15.3 (Sequoia)"
    validations:
      required: true

  - type: dropdown
    id: cli-tool
    attributes:
      label: "CLI Tool"
      description: "Which CLI tool were you using? / 你在使用哪个 CLI 工具？"
      options:
        - Claude Code
        - Codex
        - Gemini CLI
        - Cursor Agent
        - Droid
        - Qoder
        - Copilot
        - CodeBuddy
        - OpenCode
        - Multiple / Not specific
    validations:
      required: true

  - type: dropdown
    id: terminal
    attributes:
      label: "Terminal"
      options:
        - iTerm2
        - Terminal.app
        - Ghostty
        - Warp
        - VS Code / Cursor (integrated terminal)
        - Alacritty
        - Kitty
        - cmux
        - WezTerm / Kaku
        - Other
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "What happened? / 发生了什么？"
      placeholder: "When I..., I expected..., but instead..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce / 复现步骤"
      placeholder: |
        1. Start a Claude Code session
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Diagnostic logs / 诊断日志"
      description: "Settings → About → Export Diagnostics. Attach the .zip here."
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or screen recordings / 截图或录屏"
      description: "Drag and drop images or videos here"
    validations:
      required: false

  - type: checkboxes
    id: search
    attributes:
      label: "Checklist"
      options:
        - label: "I searched existing issues and this hasn't been reported yet"
          required: true
